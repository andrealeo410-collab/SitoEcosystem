<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pagina non trovata — EcosystemStudio</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%231D1D1F'/%3E%3Ctext x='50' y='50' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-size='54' letter-spacing='1' text-anchor='middle' dominant-baseline='central'%3E%3Ctspan font-weight='300' fill='%23FFFFFF'%3Ee%3C/tspan%3E%3Ctspan font-weight='600' fill='%235BA8FF'%3ES%3C/tspan%3E%3C/text%3E%3C/svg%3E" />
<style>
  :root { --ink:#1D1D1F; --blue:#0071E3; --paper:#FBFBFD; --sec:#6E6E73; --border:rgba(0,0,0,0.08); }
  @media (prefers-color-scheme: dark) {
    :root { --ink:#F5F5F7; --blue:#2997FF; --paper:#000000; --sec:#98989D; --border:rgba(255,255,255,0.12); }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
    -webkit-font-smoothing:antialiased; background:var(--paper); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
  }
  .wm { font-size:20px; letter-spacing:0.02em; margin-bottom:44px; }
  .wm .eco { font-weight:300; color:var(--ink); }
  .wm .dot { font-weight:700; color:var(--blue); margin:0 0.1em; }
  .wm .stu { font-weight:600; color:var(--blue); }
  .code { font-size:clamp(64px,16vw,96px); font-weight:600; letter-spacing:-0.03em; line-height:1; margin-bottom:18px; }
  h1 { font-size:clamp(22px,5vw,28px); font-weight:600; letter-spacing:-0.02em; margin-bottom:12px; }
  p { font-size:16px; color:var(--sec); max-width:390px; line-height:1.55; margin-bottom:32px; }
  a.btn {
    display:inline-block; background:var(--ink); color:var(--paper); text-decoration:none;
    font-weight:500; font-size:15px; padding:13px 26px; border-radius:980px; transition:opacity 0.2s ease;
  }
  a.btn:hover { opacity:0.85; }
</style>
</head>
<body>
  <div class="wm"><span class="eco">Ecosystem</span><span class="dot" aria-hidden="true">·</span><span class="stu">Studio</span></div>
  <div class="code">404</div>
  <h1>Pagina non trovata.</h1>
  <p>La pagina che cerchi non esiste o è stata spostata. Ma l'ecosistema è tutto qui.</p>
  <a class="btn" href="/">Torna alla home</a>
</body>
</html>
